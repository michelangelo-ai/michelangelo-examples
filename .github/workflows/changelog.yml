name: Changelog

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to generate changelog for. Defaults to latest tag.'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: cliff-latest
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        id: cliff-full
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
          append_body: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit CHANGELOG.md
        id: changelog-diff
        run: |
          if [ -n "$(git status --porcelain -- CHANGELOG.md)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "CHANGELOG.md unchanged, skipping PR"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR to update CHANGELOG.md
        if: steps.changelog-diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CR_PAT }}
          commit-message: "docs: update CHANGELOG.md for ${{ steps.tag.outputs.tag }}"
          title: "docs: update CHANGELOG.md for ${{ steps.tag.outputs.tag }}"
          body: "Auto-generated by changelog.yml via git-cliff."
          branch: "changelog/${{ steps.tag.outputs.tag }}"
          add-paths: CHANGELOG.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: |
            CHANGELOG.md
            RELEASE_NOTES.md
          retention-days: 90
